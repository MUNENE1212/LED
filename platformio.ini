; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared settings for every exercise.
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Exercise 01 — steady 1 Hz blink on GPIO 2.
[env:01_basic_blink]
build_src_filter = -<*> +<01_basic_blink/>

; Exercise 02 — heartbeat pattern: 3 rapid blinks + 1 s pause. Adds Serial output.
[env:02_heartbeat_blink]
build_src_filter = -<*> +<02_heartbeat_blink/>

; Exercise 03 — 3 LEDs on GPIO 4/5/18, sequential ON then sequential OFF.
[env:03_sequential_leds]
build_src_filter = -<*> +<03_sequential_leds/>

; Exercise 04 — Traffic light (R/Y/G on 2/4/5), UK-style with Red+Yellow.
[env:04_traffic_light]
build_src_filter = -<*> +<04_traffic_light/>

; Exercise 05 — Binary counter 0..7 (bits on 2/4/5) + UP/DOWN buttons on 21/22.
[env:05_binary_counter]
build_src_filter = -<*> +<05_binary_counter/>

; Exercise 06 — Random LED flasher across all four LEDs (2/4/5/18).
[env:06_random_flasher]
build_src_filter = -<*> +<06_random_flasher/>

; Exercise 07 — Two-button PWM dimmer. PWM on GPIO 2, buttons on 4 & 5.
[env:07_pwm_dimmer]
build_src_filter = -<*> +<07_pwm_dimmer/>

; Exercise 08 — Three-phase AC power sim, 3 LEDs (L1/L2/L3) on GPIO 2/4/5.
[env:08_three_phase]
build_src_filter = -<*> +<08_three_phase/>

; Exercise 09 — RGB color mixer, RGB LED on GPIO 4/5/18 across 3 LEDC channels.
[env:09_rgb_mixer]
build_src_filter = -<*> +<09_rgb_mixer/>

; Exercise 10 — Temperature indicator: same RGB LED, band-based color + hot-flash.
[env:10_temp_indicator]
build_src_filter = -<*> +<10_temp_indicator/>

; Exercise 11 — Smart LED bulb: 6 LEDs (2R/2G/2B), NVS-persisted mode cycler.
[env:11_smart_bulb]
build_src_filter = -<*> +<11_smart_bulb/>

; Exercise 12 — 4-digit 7-segment watch: multiplexed display, setup, timezone.
[env:12_watch]
build_src_filter = -<*> +<12_watch/>
